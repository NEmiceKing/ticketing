<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - Tickety Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        header {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            padding: 15px;
        }
        .logo { font-size: 20px; font-weight: bold; }
        .logo span { color: #FFD700; }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .form-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #666;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0066cc;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #004499;
        }
        .cancel-btn {
            background: #eee;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Tickety<span></span> Admin</div>
    </header>
    
    <div class="container">
        <div class="form-card">
            <h2>Edit Event</h2>
            <form method="POST" action="/admin/event/{{ event.id }}/edit">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" name="title" value="{{ event.title }}" required>
                </div>
                
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" name="date" value="{{ event.date }}" required>
                </div>
                
                <div class="form-group">
                    <label>Venue</label>
                    <input type="text" name="venue" value="{{ event.venue }}" required>
                </div>
                
                <div class="form-group">
                    <label>Price (HK$)</label>
                    <input type="number" name="price" value="{{ event.price }}" required>
                </div>
                
                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="Concerts" {% if event.category == 'Concerts' %}selected{% endif %}>Concerts</option>
                        <option value="Theater" {% if event.category == 'Theater' %}selected{% endif %}>Theater</option>
                        <option value="Sports" {% if event.category == 'Sports' %}selected{% endif %}>Sports</option>
                        <option value="Classical" {% if event.category == 'Classical' %}selected{% endif %}>Classical</option>
                        <option value="Family" {% if event.category == 'Family' %}selected{% endif %}>Family</option>
                    </select>
                </div>
                
                <div class="btn-row">
                    <button type="button" class="cancel-btn" onclick="history.back()">Cancel</button>
                    <button type="submit" class="submit-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
