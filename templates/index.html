<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickety - Concert_Tickets_Sports_Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
        }
        
        .logo span {
            color: white;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .lang-switch {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .lang-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .lang-btn.active {
            background: #FFD700;
            color: #004499;
            font-weight: bold;
        }
        
        .user-area a {
            color: white;
            text-decoration: none;
            font-size: 13px;
        }
        
        nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }
        
        nav::-webkit-scrollbar {
            display: none;
        }
        
        nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 14px;
            font-size: 14px;
            white-space: nowrap;
            border-radius: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        nav a:hover, nav a.active {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        
        /* Search */
        .search-section {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            padding: 25px 15px;
            text-align: center;
        }
        
        .search-box {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            overflow: hidden;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            font-size: 15px;
            outline: none;
        }
        
        .search-box button {
            background: #FFD700;
            color: #004499;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Categories - Hidden, using nav instead */
        .categories {
            display: none;
        }
        
        /* Events Grid */
        .events-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #FFD700;
            border-radius: 2px;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .event-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }
        
        .event-image {
            height: 120px;
            background: linear-gradient(135deg, #0066cc 0%, #FFD700 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
        }
        
        .event-date-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #FFD700;
            color: #004499;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .event-info {
            padding: 12px;
        }
        
        .event-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        
        .event-venue {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price {
            color: #0066cc;
            font-size: 16px;
            font-weight: bold;
        }
        
        .price span {
            font-size: 11px;
            color: #999;
            font-weight: normal;
        }
        
        .buy-btn {
            background: #FFD700;
            color: #004499;
            border: none;
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* Footer */
        footer {
            background: #1a1a2e;
            color: white;
            padding: 30px 15px;
            margin-top: 40px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-section h3 {
            margin-bottom: 15px;
            color: #FFD700;
            font-size: 16px;
        }
        
        .footer-section a {
            display: block;
            color: #999;
            text-decoration: none;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .footer-section a:hover {
            color: #FFD700;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .modal-header h2 {
            font-size: 18px;
            flex: 1;
            padding-right: 10px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-date {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .ticket-options {
            margin: 15px 0;
        }
        
        .ticket-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .ticket-option:hover, .ticket-option.selected {
            border-color: #FFD700;
            background: #FFFEF0;
        }
        
        .ticket-info {
            font-weight: bold;
        }
        
        .ticket-price {
            color: #0066cc;
            font-size: 18px;
            font-weight: bold;
        }
        
        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #004499;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* Mobile adjustments */
        @media (max-width: 480px) {
            .events-grid {
                grid-template-columns: 1fr;
            }
            
            .logo {
                font-size: 20px;
            }
            
            .event-card {
                display: flex;
                flex-direction: row;
            }
            
            .event-image {
                width: 100px;
                height: auto;
                min-height: 100px;
            }
            
            .lang-btn {
                padding: 4px 8px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="top-bar">
                <div class="logo">Tickety<span></span></div>
                <div class="header-right">
                    <div class="lang-switch">
                        <button class="lang-btn active" data-lang="en">EN</button>
                        <button class="lang-btn" data-lang="zh-TW">繁</button>
                        <button class="lang-btn" data-lang="zh-CN">简</button>
                    </div>
                    <div class="user-area">
                        <a href="/admin">Admin</a>
                    </div>
                </div>
            </div>
            <nav id="mainNav">
                <!-- Nav items will be inserted by JS -->
            </nav>
        </div>
    </header>
    
    <!-- Search -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search events, artists, venues...">
            <button onclick="doSearch()">Search</button>
        </div>
    </div>
    
    <!-- Events Section -->
    <div class="events-section">
        <div class="section-title" id="sectionTitle">Trending Events</div>
        <div class="events-grid" id="eventsGrid">
            <!-- Events will be inserted here -->
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3 id="footerAbout">About Us</h3>
                <a href="#" id="footerCompany">Company</a>
                <a href="#" id="footerContact">Contact</a>
                <a href="#" id="footerCareers">Careers</a>
            </div>
            <div class="footer-section">
                <h3 id="footerService">Customer Service</h3>
                <a href="#" id="footerHelp">Help Center</a>
                <a href="#" id="footerFAQ">FAQ</a>
                <a href="#" id="footerRefund">Refund Policy</a>
            </div>
            <div class="footer-section">
                <h3 id="footerFollow">Follow Us</h3>
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
            </div>
        </div>
    </footer>
    
    <!-- Ticket Modal -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Event Name</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <p id="modalVenue" class="modal-date"></p>
            
            <div class="ticket-options" id="ticketOptions">
                <!-- Ticket options will be inserted here -->
            </div>
            
            <button class="checkout-btn" onclick="checkout()" id="buyBtn">Buy Tickets</button>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                navHome: "Home", navConcerts: "Concerts", navTheater: "Theater", navSports: "Sports", navClassical: "Classical", navFamily: "Family",
                trending: "Trending Events", searchPlaceholder: "Search events, artists, venues...",
                buy: "Buy", from: "from", standard: "Standard", vip: "VIP", premium: "Premium",
                buyTickets: "Buy Tickets", thankYou: "Thank you! Your order has been placed.",
                footerAbout: "About Us", footerCompany: "Company", footerContact: "Contact", footerCareers: "Careers",
                footerService: "Customer Service", footerHelp: "Help Center", footerFAQ: "FAQ", footerRefund: "Refund Policy",
                footerFollow: "Follow Us"
            },
            "zh-TW": {
                navHome: "首頁", navConcerts: "演唱會", navTheater: "話劇", navSports: "體育", navClassical: "古典", navFamily: "親子",
                trending: "熱門活動", searchPlaceholder: "搜尋活動、藝術家、場館...",
                buy: "購票", from: "起", standard: "標準票", vip: "貴賓票", premium: "尊貴票",
                buyTickets: "立即購票", thankYou: "感謝您的購買！訂單已確認。",
                footerAbout: "關於我們", footerCompany: "公司簡介", footerContact: "聯絡我們", footerCareers: "招聘資訊",
                footerService: "客戶服務", footerHelp: "幫助中心", footerFAQ: "常見問題", footerRefund: "退票政策",
                footerFollow: "關注我們"
            },
            "zh-CN": {
                navHome: "首页", navConcerts: "演唱会", navTheater: "话剧", navSports: "体育", navClassical: "古典", navFamily: "亲子",
                trending: "热门活动", searchPlaceholder: "搜索活动、艺术家、场馆...",
                buy: "购票", from: "起", standard: "标准票", vip: "贵宾票", premium: "尊贵票",
                buyTickets: "立即购票", thankYou: "感谢您的购买！订单已确认。",
                footerAbout: "关于我们", footerCompany: "公司简介", footerContact: "联系我们", footerCareers: "招聘信息",
                footerService: "客户服务", footerHelp: "帮助中心", footerFAQ: "常见问题", footerRefund: "退票政策",
                footerFollow: "关注我们"
            }
        };
        
        let currentLang = 'en';
        
        // Sample event data (with real images)
        const events = [
            { id: 1, title: "Jay Chou World Tour 2026", date: "Apr 15, 2026", venue: "Hong Kong Coliseum", price: 880, category: "Concerts", image: "https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=400" },
            { id: 2, title: "Mayday Noah's Ark Concert", date: "Apr 20, 2026", venue: "Central Harbourfront", price: 980, category: "Concerts", image: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400" },
            { id: 3, title: "Cats - Original Musical", date: "May 01, 2026", venue: "Hong Kong Arts Centre", price: 680, category: "Theater", image: "https://images.unsplash.com/photo-1507676184212-d03ab07a01bf?w=400" },
            { id: 4, title: "HK Rugby Sevens 2026", date: "Apr 05, 2026", venue: "Hong Kong Stadium", price: 450, category: "Sports", image: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=400" },
            { id: 5, title: "Swan Lake Ballet", date: "May 10, 2026", venue: "Hong Kong Cultural Centre", price: 580, category: "Classical", image: "https://images.unsplash.com/photo-1518834107812-67b0b7c58434?w=400" },
            { id: 6, title: "Eason Chan Concert 2026", date: "Jun 01, 2026", venue: "Hong Kong Arena", price: 880, category: "Concerts", image: "https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?w=400" },
            { id: 7, title: "The Pillowman - Drama", date: "May 15, 2026", venue: "Hong Kong Arts Centre", price: 380, category: "Theater", image: "https://images.unsplash.com/photo-1503095396549-807759245b35?w=400" },
            { id: 8, title: "NBA China Games 2026", date: "Jul 20, 2026", venue: "Guangzhou Arena", price: 1280, category: "Sports", image: "https://images.unsplash.com/photo-1546519638-68e109498ffc?w=400" }
        ];
        
        // Category mapping
        const categoryMap = {
            "Concerts": { en: "Concerts", "zh-TW": "演唱會", "zh-CN": "演唱会" },
            "Theater": { en: "Theater", "zh-TW": "話劇", "zh-CN": "话剧" },
            "Sports": { en: "Sports", "zh-TW": "體育", "zh-CN": "体育" },
            "Classical": { en: "Classical", "zh-TW": "古典", "zh-CN": "古典" },
            "Family": { en: "Family", "zh-TW": "親子", "zh-CN": "亲子" }
        };
        
        let selectedEvent = null;
        let currentCategory = 'All';
        
        // Language switch
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLang = this.getAttribute('data-lang');
                updateLanguage();
            });
        });
        
        function updateLanguage() {
            const t = translations[currentLang];
            
            // Update nav
            renderNav();
            
            // Update section title
            document.getElementById('sectionTitle').textContent = t.trending;
            
            // Update search
            document.getElementById('searchInput').placeholder = t.searchPlaceholder;
            
            // Update footer
            document.getElementById('footerAbout').textContent = t.footerAbout;
            document.getElementById('footerCompany').textContent = t.footerCompany;
            document.getElementById('footerContact').textContent = t.footerContact;
            document.getElementById('footerCareers').textContent = t.footerCareers;
            document.getElementById('footerService').textContent = t.footerService;
            document.getElementById('footerHelp').textContent = t.footerHelp;
            document.getElementById('footerFAQ').textContent = t.footerFAQ;
            document.getElementById('footerRefund').textContent = t.footerRefund;
            document.getElementById('footerFollow').textContent = t.footerFollow;
            
            // Re-render events
            renderEvents(currentCategory);
            
            // Update buy button if modal open
            if (selectedEvent) {
                document.getElementById('buyBtn').textContent = t.buyTickets;
            }
        }
        
        function renderNav() {
            const t = translations[currentLang];
            const navItems = [
                { key: 'All', label: t.navHome },
                { key: 'Concerts', label: t.navConcerts },
                { key: 'Theater', label: t.navTheater },
                { key: 'Sports', label: t.navSports },
                { key: 'Classical', label: t.navClassical },
                { key: 'Family', label: t.navFamily }
            ];
            
            const nav = document.getElementById('mainNav');
            nav.innerHTML = navItems.map(item => 
                `<a href="#" class="${item.key === currentCategory ? 'active' : ''}" 
                   data-category="${item.key}" onclick="filterByNav(this)">${item.label}</a>`
            ).join('');
        }
        
        function renderEvents(category = 'All') {
            const t = translations[currentLang];
            const grid = document.getElementById('eventsGrid');
            const filtered = category === 'All' ? events : events.filter(e => e.category === category);
            
            grid.innerHTML = filtered.map(event => `
                <div class="event-card" onclick="openTicketModal(${event.id})">
                    <div class="event-image" style="background-image: url('${event.image}'); background-size: cover; background-position: center;">
                        📄
                        <div class="event-date-badge">${event.date.split(',')[0]}</div>
                    </div>
                    <div class="event-info">
                        <div class="event-title">${event.title}</div>
                        <div class="event-venue">${event.venue}</div>
                        <div class="event-footer">
                            <div class="price">HK$ ${event.price} <span>${t.from}</span></div>
                            <button class="buy-btn">${t.buy}</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterByNav(element) {
            event.preventDefault();
            const category = element.getAttribute('data-category');
            currentCategory = category;
            
            document.querySelectorAll('#mainNav a').forEach(a => a.classList.remove('active'));
            element.classList.add('active');
            
            renderEvents(category);
        }
        
        function doSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = events.filter(e => 
                e.title.toLowerCase().includes(query) || 
                e.venue.toLowerCase().includes(query)
            );
            
            const t = translations[currentLang];
            document.getElementById('sectionTitle').textContent = 'Search Results';
            
            const grid = document.getElementById('eventsGrid');
            grid.innerHTML = filtered.map(event => `
                <div class="event-card" onclick="openTicketModal(${event.id})">
                    <div class="event-image" style="background-image: url('${event.image}'); background-size: cover; background-position: center;">
                        📄
                        <div class="event-date-badge">${event.date.split(',')[0]}</div>
                    </div>
                    <div class="event-info">
                        <div class="event-title">${event.title}</div>
                        <div class="event-venue">${event.venue}</div>
                        <div class="event-footer">
                            <div class="price">HK$ ${event.price} <span>${t.from}</span></div>
                            <button class="buy-btn">${t.buy}</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function openTicketModal(eventId) {
            selectedEvent = events.find(e => e.id === eventId);
            if (!selectedEvent) return;
            
            const t = translations[currentLang];
            
            document.getElementById('modalTitle').textContent = selectedEvent.title;
            document.getElementById('modalVenue').textContent = `${selectedEvent.date} | ${selectedEvent.venue}`;
            document.getElementById('buyBtn').textContent = t.buyTickets;
            
            const prices = [
                { name: t.standard, price: selectedEvent.price },
                { name: t.vip, price: selectedEvent.price * 1.5 },
                { name: t.premium, price: selectedEvent.price * 2 }
            ];
            
            document.getElementById('ticketOptions').innerHTML = prices.map((p, i) => `
                <div class="ticket-option ${i === 0 ? 'selected' : ''}" onclick="selectTicket(this)">
                    <div class="ticket-info">${p.name}</div>
                    <div class="ticket-price">HK$ ${Math.round(p.price)}</div>
                </div>
            `).join('');
            
            document.getElementById('ticketModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('ticketModal').classList.remove('show');
        }
        
        function selectTicket(element) {
            document.querySelectorAll('.ticket-option').forEach(o => o.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        function checkout() {
            const t = translations[currentLang];
            alert(t.thankYou);
            closeModal();
        }
        
        document.getElementById('ticketModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Initial render
        renderNav();
        renderEvents();
    </script>
</body>
</html>
