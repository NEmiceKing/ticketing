<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>票票网 - 演唱会_话剧_体育赛事门票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff6b6b;
        }
        
        .logo span {
            color: white;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 15px;
        }
        
        nav a:hover {
            color: #ff6b6b;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            width: 250px;
        }
        
        .search-box button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 60px 20px;
            text-align: center;
            color: white;
        }
        
        .hero h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }
        
        .hero p {
            font-size: 18px;
            opacity: 0.8;
        }
        
        /* Categories */
        .categories {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .category {
            background: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .category:hover, .category.active {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        /* Events Grid */
        .events-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 5px;
            height: 25px;
            background: #ff6b6b;
            border-radius: 3px;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .event-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .event-card:hover {
            transform: translateY(-5px);
        }
        
        .event-image {
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
        }
        
        .event-info {
            padding: 20px;
        }
        
        .event-date {
            color: #ff6b6b;
            font-size: 14px;
            font-weight: bold;
        }
        
        .event-title {
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .event-venue {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .event-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price {
            color: #ff6b6b;
            font-size: 20px;
            font-weight: bold;
        }
        
        .price span {
            font-size: 14px;
            color: #999;
            font-weight: normal;
        }
        
        .buy-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        /* Footer */
        footer {
            background: #1a1a2e;
            color: white;
            padding: 40px 20px;
            margin-top: 60px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        
        .footer-section h3 {
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        .footer-section a {
            display: block;
            color: #999;
            text-decoration: none;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .footer-section a:hover {
            color: white;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        
        .ticket-options {
            margin: 20px 0;
        }
        
        .ticket-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .ticket-option:hover, .ticket-option.selected {
            border-color: #ff6b6b;
        }
        
        .ticket-info {
            font-weight: bold;
        }
        
        .ticket-price {
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 2px solid #ff6b6b;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        .checkout-btn {
            width: 100%;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">票票<span>网</span></div>
            <nav>
                <a href="#">首页</a>
                <a href="#">演唱会</a>
                <a href="#">话剧歌剧</a>
                <a href="#">体育赛事</a>
                <a href="#">舞蹈芭蕾</a>
                <a href="#">我的订单</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="搜索演出、赛事...">
                <button>搜索</button>
            </div>
        </div>
    </header>
    
    <!-- Hero -->
    <div class="hero">
        <h1>精选演出 尽在票票网</h1>
        <p>覆盖演唱会、体育赛事、话剧歌剧等各类精彩演出</p>
    </div>
    
    <!-- Categories -->
    <div class="categories">
        <div class="category active">全部</div>
        <div class="category">演唱会</div>
        <div class="category">话剧歌剧</div>
        <div class="category">体育赛事</div>
        <div class="category">舞蹈芭蕾</div>
        <div class="category">儿童亲子</div>
        <div class="category">音乐剧</div>
    </div>
    
    <!-- Hot Events -->
    <div class="events-section">
        <div class="section-title">热门演出</div>
        <div class="events-grid" id="eventsGrid">
            <!-- Events will be inserted here -->
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>关于我们</h3>
                <a href="#">公司介绍</a>
                <a href="#">联系方式</a>
                <a href="#">隐私政策</a>
                <a href="#">服务条款</a>
            </div>
            <div class="footer-section">
                <h3>客户服务</h3>
                <a href="#">帮助中心</a>
                <a href="#">购票指南</a>
                <a href="#">配送说明</a>
                <a href="#">退换票</a>
            </div>
            <div class="footer-section">
                <h3>商务合作</h3>
                <a href="#">商家入驻</a>
                <a href="#">票务代理</a>
                <a href="#">广告合作</a>
            </div>
            <div class="footer-section">
                <h3>关注我们</h3>
                <a href="#">微信公众号</a>
                <a href="#">微博</a>
                <a href="#">抖音</a>
            </div>
        </div>
    </footer>
    
    <!-- Ticket Modal -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">演出名称</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <p id="modalVenue" style="color: #666; margin-bottom: 20px;"></p>
            
            <div class="ticket-options" id="ticketOptions">
                <!-- Ticket options will be inserted here -->
            </div>
            
            <button class="checkout-btn" onclick="checkout()">立即购票</button>
        </div>
    </div>

    <script>
        // Sample event data
        const events = [
            {
                id: 1,
                title: "周杰伦2026世界巡回演唱会",
                date: "2026-04-15",
                venue: "香港红磡体育馆",
                price: 880,
                category: "演唱会",
                emoji: "🎤"
            },
            {
                id: 2,
                title: "五月天诺亚方舟演唱会",
                date: "2026-04-20",
                venue: "香港中环海滨活动空间",
                price: 980,
                category: "演唱会",
                emoji: "🎸"
            },
            {
                id: 3,
                title: "经典原版音乐剧《猫》",
                date: "2026-05-01",
                venue: "香港文化艺术中心",
                price: 680,
                category: "音乐剧",
                emoji: "🐱"
            },
            {
                id: 4,
                title: "2026香港国际七人榄球赛",
                date: "2026-04-05",
                venue: "香港大球场",
                price: 450,
                category: "体育赛事",
                emoji: "🏉"
            },
            {
                id: 5,
                title: "芭蕾舞剧《天鹅湖》",
                date: "2026-05-10",
                venue: "香港文化中心大剧院",
                price: 580,
                category: "舞蹈芭蕾",
                emoji: "🦢"
            },
            {
                id: 6,
                title: "陈奕迅FEAR and DREAMS演唱会",
                date: "2026-06-01",
                venue: "香港体育馆",
                price: 880,
                category: "演唱会",
                emoji: "🎤"
            },
            {
                id: 7,
                title: "悬疑话剧《枕头人》",
                date: "2026-05-15",
                venue: "香港艺术中心",
                price: 380,
                category: "话剧歌剧",
                emoji: "🎭"
            },
            {
                id: 8,
                title: "NBA篮球赛中国行",
                date: "2026-07-20",
                venue: "广州体育馆",
                price: 1280,
                category: "体育赛事",
                emoji: "🏀"
            }
        ];
        
        let selectedEvent = null;
        
        // Render events
        function renderEvents(category = '全部') {
            const grid = document.getElementById('eventsGrid');
            const filtered = category === '全部' ? events : events.filter(e => e.category === category);
            
            grid.innerHTML = filtered.map(event => `
                <div class="event-card" onclick="openTicketModal(${event.id})">
                    <div class="event-image">${event.emoji}</div>
                    <div class="event-info">
                        <div class="event-date">${event.date}</div>
                        <div class="event-title">${event.title}</div>
                        <div class="event-venue">${event.venue}</div>
                        <div class="event-price">
                            <div class="price">HK$ ${event.price} <span>起</span></div>
                            <button class="buy-btn">购票</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Category filter
        document.querySelectorAll('.category').forEach(cat => {
            cat.addEventListener('click', function() {
                document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                renderEvents(this.textContent);
            });
        });
        
        // Modal functions
        function openTicketModal(eventId) {
            selectedEvent = events.find(e => e.id === eventId);
            if (!selectedEvent) return;
            
            document.getElementById('modalTitle').textContent = selectedEvent.title;
            document.getElementById('modalVenue').textContent = `${selectedEvent.date} | ${selectedEvent.venue}`;
            
            // Generate ticket options
            const prices = [
                { name: '标准票', price: selectedEvent.price },
                { name: 'VIP票', price: selectedEvent.price * 1.5 },
                { name: '贵宾票', price: selectedEvent.price * 2 }
            ];
            
            document.getElementById('ticketOptions').innerHTML = prices.map((p, i) => `
                <div class="ticket-option ${i === 0 ? 'selected' : ''}" onclick="selectTicket(this)">
                    <div class="ticket-info">${p.name}</div>
                    <div class="ticket-price">HK$ ${Math.round(p.price)}</div>
                </div>
            `).join('');
            
            document.getElementById('ticketModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('ticketModal').classList.remove('show');
        }
        
        function selectTicket(element) {
            document.querySelectorAll('.ticket-option').forEach(o => o.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        function checkout() {
            alert('感谢您的购买！订单已生成。');
            closeModal();
        }
        
        // Initial render
        renderEvents();
    </script>
</body>
</html>
