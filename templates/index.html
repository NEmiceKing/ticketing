<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickety - Concert_Tickets_Sports_Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
        }
        
        .logo span {
            color: white;
        }
        
        .user-area {
            display: flex;
            gap: 10px;
        }
        
        .user-btn {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
        }
        
        nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }
        
        nav::-webkit-scrollbar {
            display: none;
        }
        
        nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 14px;
            font-size: 14px;
            white-space: nowrap;
            border-radius: 20px;
            transition: all 0.2s;
        }
        
        nav a:hover, nav a.active {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        
        /* Search */
        .search-section {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            padding: 25px 15px;
            text-align: center;
        }
        
        .search-box {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            overflow: hidden;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            font-size: 15px;
            outline: none;
        }
        
        .search-box button {
            background: #FFD700;
            color: #004499;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Categories */
        .categories {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .categories::-webkit-scrollbar {
            display: none;
        }
        
        .category {
            background: white;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            white-space: nowrap;
            font-size: 14px;
        }
        
        .category:hover, .category.active {
            border-color: #FFD700;
            background: #FFFEF0;
            color: #0066cc;
        }
        
        /* Events Grid */
        .events-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #FFD700;
            border-radius: 2px;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .event-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }
        
        .event-image {
            height: 120px;
            background: linear-gradient(135deg, #0066cc 0%, #FFD700 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
        }
        
        .event-date-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #FFD700;
            color: #004499;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .event-info {
            padding: 12px;
        }
        
        .event-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        
        .event-venue {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price {
            color: #0066cc;
            font-size: 16px;
            font-weight: bold;
        }
        
        .price span {
            font-size: 11px;
            color: #999;
            font-weight: normal;
        }
        
        .buy-btn {
            background: #FFD700;
            color: #004499;
            border: none;
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* Footer */
        footer {
            background: #1a1a2e;
            color: white;
            padding: 30px 15px;
            margin-top: 40px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-section h3 {
            margin-bottom: 15px;
            color: #FFD700;
            font-size: 16px;
        }
        
        .footer-section a {
            display: block;
            color: #999;
            text-decoration: none;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .footer-section a:hover {
            color: #FFD700;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .modal-header h2 {
            font-size: 18px;
            flex: 1;
            padding-right: 10px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-date {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .ticket-options {
            margin: 15px 0;
        }
        
        .ticket-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .ticket-option:hover, .ticket-option.selected {
            border-color: #FFD700;
            background: #FFFEF0;
        }
        
        .ticket-info {
            font-weight: bold;
        }
        
        .ticket-price {
            color: #0066cc;
            font-size: 18px;
            font-weight: bold;
        }
        
        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #004499;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* Mobile adjustments */
        @media (max-width: 480px) {
            .events-grid {
                grid-template-columns: 1fr;
            }
            
            .logo {
                font-size: 20px;
            }
            
            .event-card {
                display: flex;
                flex-direction: row;
            }
            
            .event-image {
                width: 100px;
                height: auto;
                min-height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="top-bar">
                <div class="logo">Tickety<span></span></div>
                <div class="user-area">
                    <a href="/admin" style="color: white; text-decoration: none; font-size: 13px;">Admin</a>
                </div>
            </div>
            <nav>
                <a href="#" class="active">Home</a>
                <a href="#">Concerts</a>
                <a href="#">Theater</a>
                <a href="#">Sports</a>
                <a href="#">Classical</a>
                <a href="#">Family</a>
                <a href="#">My Tickets</a>
            </nav>
        </div>
    </header>
    
    <!-- Search -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" placeholder="Search events, artists, venues...">
            <button>Search</button>
        </div>
    </div>
    
    <!-- Categories -->
    <div class="categories">
        <div class="category active">All</div>
        <div class="category">Concerts</div>
        <div class="category">Theater</div>
        <div class="category">Sports</div>
        <div class="category">Classical</div>
        <div class="category">Family</div>
    </div>
    
    <!-- Hot Events -->
    <div class="events-section">
        <div class="section-title">Trending Events</div>
        <div class="events-grid" id="eventsGrid">
            <!-- Events will be inserted here -->
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About Us</h3>
                <a href="#">Company</a>
                <a href="#">Contact</a>
                <a href="#">Careers</a>
            </div>
            <div class="footer-section">
                <h3>Customer Service</h3>
                <a href="#">Help Center</a>
                <a href="#">FAQ</a>
                <a href="#">Refund Policy</a>
            </div>
            <div class="footer-section">
                <h3>Follow Us</h3>
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
            </div>
        </div>
    </footer>
    
    <!-- Ticket Modal -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Event Name</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <p id="modalVenue" class="modal-date"></p>
            
            <div class="ticket-options" id="ticketOptions">
                <!-- Ticket options will be inserted here -->
            </div>
            
            <button class="checkout-btn" onclick="checkout()">Buy Tickets</button>
        </div>
    </div>

    <script>
        // Sample event data
        const events = [
            {
                id: 1,
                title: "Jay Chou World Tour 2026",
                date: "Apr 15, 2026",
                venue: "Hong Kong Coliseum",
                price: 880,
                category: "Concerts",
                emoji: "🎤"
            },
            {
                id: 2,
                title: "Mayday Noah's Ark Concert",
                date: "Apr 20, 2026",
                venue: "Central Harbourfront",
                price: 980,
                category: "Concerts",
                emoji: "🎸"
            },
            {
                id: 3,
                title: "Cats - Original Musical",
                date: "May 01, 2026",
                venue: "Hong Kong Arts Centre",
                price: 680,
                category: "Theater",
                emoji: "🐱"
            },
            {
                id: 4,
                title: "HK Rugby Sevens 2026",
                date: "Apr 05, 2026",
                venue: "Hong Kong Stadium",
                price: 450,
                category: "Sports",
                emoji: "🏉"
            },
            {
                id: 5,
                title: "Swan Lake Ballet",
                date: "May 10, 2026",
                venue: "Hong Kong Cultural Centre",
                price: 580,
                category: "Classical",
                emoji: "🦢"
            },
            {
                id: 6,
                title: "Eason Chan Concert 2026",
                date: "Jun 01, 2026",
                venue: "Hong Kong Arena",
                price: 880,
                category: "Concerts",
                emoji: "🎤"
            },
            {
                id: 7,
                title: "The Pillowman - Drama",
                date: "May 15, 2026",
                venue: "Hong Kong Arts Centre",
                price: 380,
                category: "Theater",
                emoji: "🎭"
            },
            {
                id: 8,
                title: "NBA China Games 2026",
                date: "Jul 20, 2026",
                venue: "Guangzhou Arena",
                price: 1280,
                category: "Sports",
                emoji: "🏀"
            }
        ];
        
        let selectedEvent = null;
        
        // Render events
        function renderEvents(category = 'All') {
            const grid = document.getElementById('eventsGrid');
            const filtered = category === 'All' ? events : events.filter(e => e.category === category);
            
            grid.innerHTML = filtered.map(event => `
                <div class="event-card" onclick="openTicketModal(${event.id})">
                    <div class="event-image">
                        ${event.emoji}
                        <div class="event-date-badge">${event.date.split(',')[0]}</div>
                    </div>
                    <div class="event-info">
                        <div class="event-title">${event.title}</div>
                        <div class="event-venue">${event.venue}</div>
                        <div class="event-footer">
                            <div class="price">HK$ ${event.price} <span>from</span></div>
                            <button class="buy-btn">Buy</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Category filter
        document.querySelectorAll('.category').forEach(cat => {
            cat.addEventListener('click', function() {
                document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                renderEvents(this.textContent);
            });
        });
        
        // Modal functions
        function openTicketModal(eventId) {
            selectedEvent = events.find(e => e.id === eventId);
            if (!selectedEvent) return;
            
            document.getElementById('modalTitle').textContent = selectedEvent.title;
            document.getElementById('modalVenue').textContent = `${selectedEvent.date} | ${selectedEvent.venue}`;
            
            // Generate ticket options
            const prices = [
                { name: 'Standard', price: selectedEvent.price },
                { name: 'VIP', price: selectedEvent.price * 1.5 },
                { name: 'Premium', price: selectedEvent.price * 2 }
            ];
            
            document.getElementById('ticketOptions').innerHTML = prices.map((p, i) => `
                <div class="ticket-option ${i === 0 ? 'selected' : ''}" onclick="selectTicket(this)">
                    <div class="ticket-info">${p.name}</div>
                    <div class="ticket-price">HK$ ${Math.round(p.price)}</div>
                </div>
            `).join('');
            
            document.getElementById('ticketModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('ticketModal').classList.remove('show');
        }
        
        function selectTicket(element) {
            document.querySelectorAll('.ticket-option').forEach(o => o.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        function checkout() {
            alert('Thank you! Your order has been placed.');
            closeModal();
        }
        
        // Close modal when clicking outside
        document.getElementById('ticketModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Initial render
        renderEvents();
    </script>
</body>
</html>
