<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Tickety</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .payment-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 20px;
        }
        .logo span { color: #FFD700; }
        h2 { text-align: center; margin-bottom: 20px; }
        .order-summary {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #666;
        }
        .order-total {
            display: flex;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 2px solid #eee;
            font-size: 20px;
            font-weight: bold;
            color: #0066cc;
        }
        .payment-methods {
            margin: 20px 0;
        }
        .payment-methods h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .method {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .method:hover, .method.selected {
            border-color: #FFD700;
            background: #FFFEF0;
        }
        .method-icon {
            font-size: 28px;
            margin-right: 15px;
        }
        .method-name {
            font-weight: bold;
        }
        .pay-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #004499;
            cursor: pointer;
        }
        .pay-btn:hover { transform: translateY(-2px); }
        .secure {
            text-align: center;
            margin-top: 15px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="payment-box">
        <div class="logo">Tickety<span></span></div>
        <h2>Payment</h2>
        
        <div class="order-summary">
            <div class="order-row">
                <span>Event:</span>
                <span>{{ order.event_title }}</span>
            </div>
            <div class="order-row">
                <span>Ticket Type:</span>
                <span>{{ order.ticket_type }}</span>
            </div>
            <div class="order-row">
                <span>Quantity:</span>
                <span>{{ order.quantity }}</span>
            </div>
            <div class="order-total">
                <span>Total:</span>
                <span>HK$ {{ order.total }}</span>
            </div>
        </div>
        
        <div class="payment-methods">
            <h3>Select Payment Method:</h3>
            <div class="method selected" onclick="selectMethod(this)">
                <span class="method-icon">💳</span>
                <span class="method-name">Credit Card</span>
            </div>
            <div class="method" onclick="selectMethod(this)">
                <span class="method-icon">📱</span>
                <span class="method-name">PayMe / FPS</span>
            </div>
            <div class="method" onclick="selectMethod(this)">
                <span class="method-icon">🏦</span>
                <span class="method-name">Bank Transfer</span>
            </div>
        </div>
        
        <button class="pay-btn" onclick="processPayment()">
            Pay HK$ {{ order.total }}
        </button>
        
        <p class="secure">🔒 Secure payment powered by Tickety</p>
    </div>
    
    <script>
        function selectMethod(element) {
            document.querySelectorAll('.method').forEach(m => m.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        async function processPayment() {
            const btn = document.querySelector('.pay-btn');
            btn.textContent = 'Processing...';
            btn.disabled = true;
            
            // Simulate payment processing
            await new Promise(r => setTimeout(r, 2000));
            
            const res = await fetch('/payment/{{ order.id }}/process', {
                method: 'POST'
            });
            
            const data = await res.json();
            
            if (data.success) {
                alert('Payment successful! Your tickets have been sent to your email.');
                window.location.href = '/';
            } else {
                alert('Payment failed. Please try again.');
                btn.textContent = 'Pay HK$ {{ order.total }}';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
